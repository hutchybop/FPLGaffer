services:

  fplgaffer:
    image: ghcr.io/hutchybop/fplgaffer:latest
    container_name: fplgaffer
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./reports:/app/reports

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3006/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - npm_network

networks:
  npm_network:
    external: true
